name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

# One release at a time; queue rather than cancel so every merge gets a version.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # Compute the next semver tag from commit messages since the last tag:
  #   feat!: / BREAKING CHANGE  -> major
  #   feat:                     -> minor
  #   anything else             -> patch
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump semver tag
        id: bump
        run: |
          set -euo pipefail
          existing=$(git tag --points-at HEAD --list 'v*' | head -1)
          if [ -n "$existing" ]; then
            echo "HEAD already tagged $existing; reusing it"
            echo "tag=$existing" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest=$(git tag --list 'v*' --sort=-v:refname | head -1)
          if [ -z "$latest" ]; then
            tag="v0.1.0"
          else
            IFS=. read -r major minor patch <<< "${latest#v}"
            log=$(git log "$latest"..HEAD --pretty=%s%n%b)
            if echo "$log" | grep -qE '^[a-zA-Z]+(\(.+\))?!:|BREAKING CHANGE'; then
              major=$((major+1)); minor=0; patch=0
            elif echo "$log" | grep -qE '^feat(\(.+\))?:'; then
              minor=$((minor+1)); patch=0
            else
              patch=$((patch+1))
            fi
            tag="v${major}.${minor}.${patch}"
          fi

          git tag "$tag"
          git push origin "$tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  # Cross-platform binaries attached to a GitHub Release for the new tag.
  binaries:
    needs: version
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release binaries
        run: |
          set -euo pipefail
          mkdir -p dist
          for platform in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            GOOS=${platform%/*}
            GOARCH=${platform#*/}
            bin=ahab
            [ "$GOOS" = "windows" ] && bin=ahab.exe
            CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH \
              go build -trimpath -ldflags "-s -w -X main.version=${TAG}" \
              -o "build/${GOOS}_${GOARCH}/${bin}" ./cmd/ahab
            if [ "$GOOS" = "windows" ]; then
              (cd "build/${GOOS}_${GOARCH}" && zip -q "../../dist/ahab_${TAG}_${GOOS}_${GOARCH}.zip" "$bin")
            else
              tar -czf "dist/ahab_${TAG}_${GOOS}_${GOARCH}.tar.gz" -C "build/${GOOS}_${GOARCH}" "$bin"
            fi
          done
          (cd dist && sha256sum * > checksums.txt)

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$TAG" dist/* \
              --title "$TAG" \
              --generate-notes \
              --repo "$GITHUB_REPOSITORY"
          fi

  # Container image with the ahab binary, pushed to this repo's GitHub
  # Container Registry (ghcr.io/<owner>/<repo>).
  image:
    needs: version
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ needs.version.outputs.tag }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ needs.version.outputs.tag }}
            ghcr.io/${{ github.repository }}:latest
